
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="carousel.css">
</head>

<body>
    <div class="carousel"><!--contenedor principal del carousel-->
        <div class="carousel-container"><!--contenedor del carousel que se mueve-->
            
            <div class="slide"><!--slide 1 del carousel imagene que se mueve-->
                <img src="https://img.freepik.com/fotos-premium/vista-cordillera-lago-congelado-pico-invierno-montana-achisho-sochi-rusia_455610-1637.jpg?semt=ais_hybrid&w=740&q=80" 
                        alt="tranquilidad"><!--imagen 1 del slide-->
            </div>

            <div class="slide"><!--slide 2 del carousel imagen que se mueve-->
                <img src="https://img.freepik.com/fotos-premium/paisaje-sereno-otono-que-refleja-follaje-vibrante-lago-tranquilo-montanas-fondo_7556-2645.jpg?semt=ais_hybrid&w=740&q=80" 
                        alt="tramquilidad"><!--imagen 2 del slide-->
            </div>
            <div class="slide"><!--slide 3 del carousel imagen que se mueve-->
                <img src="https://img.freepik.com/fotos-premium/luz-manana-brilla-sobre-lago-reflectante-impresionantes-montanas-follaje-otonal-maximo_501731-6366.jpg?semt=ais_incoming&w=740&q=80" 
                        alt="tramquilidad"><!--imagen 3 del slide-->
            </div>
        </div>
        <!--boton de la izquierda y derecha-->    
        <button class="izquierda">&lt</button><!--boton izquierda &lt flecha a la izquierda-->
        <button class="derecha">&gt</button><!--boton derecha &gt flecha a la derecha-->
    </div>
    <script src="carousel.js"></script><!--script para relacionar con el javascript-->
</body>

</html>
